name: Bump mel formula

# Tracks the latest @melius-ai/cli release on npm and updates Formula/mel.rb —
# hourly and on demand.
#
# Pushing needs a GitHub App token: the Melius-AI enterprise disables write for
# the default GITHUB_TOKEN *and* deploy keys, so neither can push. Configure the
# same org GitHub App used for release-please (installed on this repo too) via
# secrets RELEASE_PLEASE_APP_ID + RELEASE_PLEASE_APP_PRIVATE_KEY. Until then this
# skips cleanly — bump manually with `scripts/bump.sh`.

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch: {}

concurrency:
  group: bump-mel
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mint GitHub App token
        id: token
        if: ${{ secrets.RELEASE_PLEASE_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - name: No push credential — skip
        if: ${{ steps.token.outputs.token == '' }}
        run: echo "::notice::No app token configured — skipping auto-bump. Run scripts/bump.sh manually, or set the app secrets (see README)."

      - uses: actions/checkout@v4
        if: ${{ steps.token.outputs.token != '' }}
        timeout-minutes: 5
        with:
          token: ${{ steps.token.outputs.token }}

      - name: Bump to the latest npm release
        if: ${{ steps.token.outputs.token != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash scripts/bump.sh --push
