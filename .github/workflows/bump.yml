name: Bump mel formula

# Re-pins Formula/mel.rb to the latest @melius-ai/cli on npm and auto-merges the
# change. Triggers:
#   - repository_dispatch (npm-published) from the monorepo release workflow —
#     fires right after a new version publishes (near-instant).
#   - schedule (hourly) — fallback in case a dispatch is ever missed.
#   - workflow_dispatch — manual.
#
# master is branch-protected (no direct pushes), so this opens a PR and
# auto-merges it. Pushing/merging needs a token that isn't the default
# GITHUB_TOKEN (the Melius-AI enterprise disables its write + deploy keys): set
# RELEASE_PLEASE_TOKEN — the same fine-grained PAT (Contents + Pull requests
# write) the monorepo uses. Until it's set the job is a clean no-op — bump
# manually with scripts/bump.sh.

on:
  repository_dispatch:
    types: [npm-published]
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch: {}

concurrency:
  group: bump-mel
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # env (unlike secrets) is available in step `if:` — gate on this so the
      # job skips cleanly when the token isn't configured.
      TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
    steps:
      - name: No token — skip
        if: ${{ env.TOKEN == '' }}
        run: echo "::notice::RELEASE_PLEASE_TOKEN not set — skipping auto-bump. Bump manually with scripts/bump.sh, or add the token (see README)."

      - uses: actions/checkout@v4
        if: ${{ env.TOKEN != '' }}
        timeout-minutes: 5
        with:
          token: ${{ env.TOKEN }}

      - name: Bump to the latest npm release and merge
        if: ${{ env.TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash scripts/bump.sh   # edits Formula/mel.rb if npm is ahead; no push
          if git diff --quiet; then
            echo "::notice::Formula already current — nothing to do."
            exit 0
          fi
          version="$(grep -oE 'cli-[0-9]+\.[0-9]+\.[0-9]+\.tgz' Formula/mel.rb | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          branch="auto-bump/mel-${version}"
          git switch -C "$branch"
          git commit -am "mel ${version}"
          git push -f origin "$branch"
          gh pr view "$branch" >/dev/null 2>&1 \
            || gh pr create --base master --head "$branch" \
                 --title "mel ${version}" \
                 --body "Automated bump of \`Formula/mel.rb\` to \`@melius-ai/cli@${version}\` (url + sha256 from npm)."
          # master requires a PR (0 approvals, no required checks); merge it,
          # retrying while GitHub finishes computing mergeability.
          for i in $(seq 1 6); do
            gh pr merge "$branch" --squash --delete-branch && exit 0
            echo "merge not ready yet (attempt ${i}) — retrying"; sleep 10
          done
          echo "::error::Could not auto-merge the bump PR for ${version}."
          exit 1
